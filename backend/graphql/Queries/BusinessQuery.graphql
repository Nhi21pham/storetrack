extend type Query {
    myBusinesses: [Business!]! @guard(with: ["sanctum"])
        @field(resolver: "App\\GraphQL\\Queries\\BusinessResolver@myBusinesses")

    business(id: ID!): Business @guard(with: ["sanctum"])
        @field(resolver: "App\\GraphQL\\Queries\\BusinessResolver@getBusiness")
        
    accessibleBusinesses: [AccessibleBusiness!]! @guard(with: ["sanctum"])
        @field(resolver: "App\\GraphQL\\Queries\\BusinessResolver@accessibleBusinesses")

    business(id: ID!): Business @guard(with: ["sanctum"])
        @field(resolver: "App\\GraphQL\\Queries\\BusinessResolver@getBusiness")
}