type Store {
    id: ID!
    name: String!
    address: String
    email: String
    phone: String
    is_active: Boolean!
    deactivated_at: DateTime
    business: Business! @belongsTo
    users: [StoreMember!]!
        @field(resolver: "App\\GraphQL\\Types\\StoreMembersResolver")
    my_role: Role
        @field(resolver: "App\\GraphQL\\Types\\StoreMyRoleResolver")
    created_at: DateTime!
    updated_at: DateTime!
}

type StoreMember {
    id: ID!
    name: String!
    email: String!
    role: Role!
}