type AccessibleBusiness {
    id: ID!
    name: String!
    tax_code: String!
    address: String
    email: String
    phone: String
    role: String!
    stores: [AccessibleStore!]!
}

type AccessibleStore {
    id: ID!
    name: String!
    address: String
    email: String
    phone: String
    is_active: Boolean!
    my_role: Role!
    business: AccessibleBusinessInfo!
    users: [AccessibleStoreMember!]!
}

type AccessibleStoreMember {
    id: ID!
    name: String!
    email: String!
    role: Role!
}

type AccessibleBusinessInfo {
    id: ID!
    name: String!
}