type Query {
    ping: String!
}

type Mutation {
    register(
        name: String!
        email: String!
        password: String!
        password_confirmation: String!
    ): RegisterResponse! @field(resolver: "App\\GraphQL\\Mutations\\RegisterResolver@register")

    verifyCode(email: String!, code: String!): MessageResponse!
        @field(resolver: "App\\GraphQL\\Mutations\\VerifyCodeResolver@verifyCode")

    resendCode(email: String!): MessageResponse!
        @field(resolver: "App\\GraphQL\\Mutations\\ResendCodeResolver@resendCode")
}

type RegisterResponse {
    message: String!
    email: String!
}

type MessageResponse {
    message: String!
}
