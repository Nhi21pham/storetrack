type Query {
    ping: String!
}

type Mutation {
    register(
        name: String!
        email: String!
        password: String!
        password_confirmation: String!
    ): RegisterResponse! @field(resolver: "App\\GraphQL\\Mutations\\Register")

    verifyCode(email: String!, code: String!): MessageResponse!
        @field(resolver: "App\\GraphQL\\Mutations\\VerifyCode")

    resendCode(email: String!): MessageResponse!
        @field(resolver: "App\\GraphQL\\Mutations\\ResendCode")
}

type RegisterResponse {
    message: String!
    email: String!
}

type MessageResponse {
    message: String!
}
