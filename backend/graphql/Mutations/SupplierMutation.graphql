extend type Mutation {
    createSupplier(input: CreateSupplierInput! @spread): Supplier!
        @guard(with: ["sanctum"])
        @field(resolver: "App\\GraphQL\\Mutations\\SupplierResolver@create")

    updateSupplier(id: ID!, input: UpdateSupplierInput! @spread): Supplier!
        @guard(with: ["sanctum"])
        @field(resolver: "App\\GraphQL\\Mutations\\SupplierResolver@update")

    deleteSupplier(id: ID!): Boolean!
        @guard(with: ["sanctum"])
        @field(resolver: "App\\GraphQL\\Mutations\\SupplierResolver@delete")
}

input CreateSupplierInput {
    name: String! @rules(apply: ["required", "string", "min:2", "max:255"])
    email: String @rules(apply: ["nullable", "email", "max:255"])
    phone: String @rules(apply: ["nullable", "string", "regex:/^\\d{10}$/"])
    address: String @rules(apply: ["nullable", "string", "max:500"])
    tax_code: String @rules(apply: ["nullable", "string", "max:50"])
}

input UpdateSupplierInput {
    name: String @rules(apply: ["sometimes", "string", "min:2", "max:255"])
    email: String @rules(apply: ["nullable", "email", "max:255"])
    phone: String @rules(apply: ["nullable", "string", "regex:/^\\d{10}$/"])
    address: String @rules(apply: ["nullable", "string", "max:500"])
    tax_code: String @rules(apply: ["nullable", "string", "max:50"])
}
