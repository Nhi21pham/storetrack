extend type Mutation {
    createCustomer(input: CreateCustomerInput! @spread): Customer!
        @guard(with: ["sanctum"])
        @field(resolver: "App\\GraphQL\\Mutations\\CustomerResolver@create")

    updateCustomer(id: ID!, input: UpdateCustomerInput! @spread): Customer!
        @guard(with: ["sanctum"])
        @field(resolver: "App\\GraphQL\\Mutations\\CustomerResolver@update")

    deleteCustomer(id: ID!): Boolean!
        @guard(with: ["sanctum"])
        @field(resolver: "App\\GraphQL\\Mutations\\CustomerResolver@delete")
}

input CreateCustomerInput {
    name: String! @rules(apply: ["required", "string", "min:2", "max:255"])
    email: String @rules(apply: ["nullable", "email", "max:255"])
    phone: String @rules(apply: ["nullable", "string", "regex:/^\\d{10}$/"])
    address: String @rules(apply: ["nullable", "string", "max:500"])
    tax_code: String @rules(apply: ["nullable", "string", "max:50"])
}

input UpdateCustomerInput {
    name: String @rules(apply: ["sometimes", "string", "min:2", "max:255"])
    email: String @rules(apply: ["nullable", "email", "max:255"])
    phone: String @rules(apply: ["nullable", "string", "regex:/^\\d{10}$/"])
    address: String @rules(apply: ["nullable", "string", "max:500"])
    tax_code: String @rules(apply: ["nullable", "string", "max:50"])
}
